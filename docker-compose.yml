services:
  # 1. API GATEWAY: TRAEFIK
  traefik:
    image: traefik:v2.11
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"       # Public HTTP port
      - "8080:8080"   # Traefik Dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  # 2. MICROSERVICE 1: User Service (Node.js)
  user-service:
    build: ./user-service
    environment:
      - DATABASE_SHARD_A_WRITE_URL=${DATABASE_SHARD_A_WRITE_URL}
      - DATABASE_SHARD_A_READ_URL=${DATABASE_SHARD_A_READ_URL}
      - DATABASE_SHARD_B_WRITE_URL=${DATABASE_SHARD_B_WRITE_URL}
      - DATABASE_SHARD_B_READ_URL=${DATABASE_SHARD_B_READ_URL}
      - DATABASE_SHARD_C_WRITE_URL=${DATABASE_SHARD_C_WRITE_URL}
      - DATABASE_SHARD_C_READ_URL=${DATABASE_SHARD_C_READ_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - shard-a-primary
      - shard-b-primary
      - shard-c-primary
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.users.rule=PathPrefix(`/api/users`)"
      - "traefik.http.services.users.loadbalancer.server.port=8000"

  # 3. MICROSERVICE 2: Product Service (Python FastAPI)
  product-service:
    build: ./product-service
    environment:
      - MONGO_URL=mongodb://mongo:27017/
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - mongo
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.products.rule=PathPrefix(`/api/products`)"
      - "traefik.http.services.products.loadbalancer.server.port=8000"

  # 4. MICROSERVICE 3: Order Service (Java Spring Boot)
  order-service:
    build: ./order-service
    depends_on:
      - rabbitmq
      - order_db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orders.rule=PathPrefix(`/api/orders`)"
      - "traefik.http.services.orders.loadbalancer.server.port=8000"
    environment:
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://order_db:5432/orderdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres

  # 5. MICROSERVICE 4: Notification Service (Node.js)
  notification-service:
    build: ./notification-service
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}

  # 6. MICROSERVICE 5: Inventory Service (Python)
  inventory-service:
    build: ./inventory-service
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}

  # 7. MICROSERVICE 6: SMS Worker (Node.js)
  sms-worker:
    build: ./sms-worker
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
    deploy:
      replicas: 2 # Chạy 2 worker để minh họa MQ Point-to-Point (chia đều job)

  # 8. BACKING SERVICES (Databases & Message Broker)
  # --- SHARD A ---
  shard-a-primary:
    image: docker.io/bitnami/postgresql:latest
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=${POSTGRES_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
      - POSTGRESQL_USERNAME=${POSTGRES_USER}
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRES_DB}
    volumes:
      - shard_a_primary_data:/bitnami/postgresql

  shard-a-replica:
    image: docker.io/bitnami/postgresql:latest
    depends_on:
      - shard-a-primary
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=${POSTGRES_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
      - POSTGRESQL_MASTER_HOST=shard-a-primary
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - shard_a_replica_data:/bitnami/postgresql

  # --- SHARD B ---
  shard-b-primary:
    image: docker.io/bitnami/postgresql:latest
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=${POSTGRES_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
      - POSTGRESQL_USERNAME=${POSTGRES_USER}
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRES_DB}
    volumes:
      - shard_b_primary_data:/bitnami/postgresql

  shard-b-replica:
    image: docker.io/bitnami/postgresql:latest
    depends_on:
      - shard-b-primary
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=${POSTGRES_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
      - POSTGRESQL_MASTER_HOST=shard-b-primary
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - shard_b_replica_data:/bitnami/postgresql

  # --- SHARD C ---
  shard-c-primary:
    image: docker.io/bitnami/postgresql:latest
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=${POSTGRES_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
      - POSTGRESQL_USERNAME=${POSTGRES_USER}
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRES_DB}
    volumes:
      - shard_c_primary_data:/bitnami/postgresql

  shard-c-replica:
    image: docker.io/bitnami/postgresql:latest
    depends_on:
      - shard-c-primary
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=${POSTGRES_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
      - POSTGRESQL_MASTER_HOST=shard-c-primary
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - shard_c_replica_data:/bitnami/postgresql

  order_db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=orderdb
    volumes:
      - order_db_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6-jammy
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672" # RabbitMQ Management Dashboard

volumes:
  shard_a_primary_data:
  shard_a_replica_data:
  shard_b_primary_data:
  shard_b_replica_data:
  shard_c_primary_data:
  shard_c_replica_data:
  order_db_data:
