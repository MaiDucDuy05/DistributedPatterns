services:
  # 1. API GATEWAY: TRAEFIK
  traefik:
    image: traefik:v2.11
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"       # Public HTTP port
      - "8080:8080"   # Traefik Dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  # 2. MICROSERVICE 1: User Service (Node.js)
  user-service:
    build: ./user-service
    environment:
      - DATABASE_WRITE_URL=${DATABASE_WRITE_URL}
      - DATABASE_READ_URL=${DATABASE_READ_URL}
    depends_on:
      - pgpool
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.users.rule=PathPrefix(`/api/users`)"
      - "traefik.http.services.users.loadbalancer.server.port=8000"

  # 3. MICROSERVICE 2: Product Service (Python FastAPI)
  product-service:
    build: ./product-service
    environment:
      - MONGO_URL=mongodb://mongo:27017/
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - mongo
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.products.rule=PathPrefix(`/api/products`)"
      - "traefik.http.services.products.loadbalancer.server.port=8000"

  # 4. MICROSERVICE 3: Order Service (Java Spring Boot)
  order-service:
    build: ./order-service
    depends_on:
      - rabbitmq
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orders.rule=PathPrefix(`/api/orders`)"
      - "traefik.http.services.orders.loadbalancer.server.port=8000"
    environment:
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}

  # 5. MICROSERVICE 4: Notification Service (Node.js)
  notification-service:
    build: ./notification-service
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}

  # 6. MICROSERVICE 5: Inventory Service (Python)
  inventory-service:
    build: ./inventory-service
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}

  # 7. MICROSERVICE 6: SMS Worker (Node.js)
  sms-worker:
    build: ./sms-worker
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
    deploy:
      replicas: 2 # Chạy 2 worker để minh họa MQ Point-to-Point (chia đều job)

  # 8. BACKING SERVICES (Databases & Message Broker)
  postgres-primary:
    image: docker.io/bitnami/postgresql:latest
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=${POSTGRES_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
      - POSTGRESQL_USERNAME=${POSTGRES_USER}
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRES_DB}
    volumes:
      - postgres_primary_data:/bitnami/postgresql

  postgres-replica:
    image: docker.io/bitnami/postgresql:latest
    depends_on:
      - postgres-primary
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=${POSTGRES_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
      - POSTGRESQL_MASTER_HOST=postgres-primary
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_replica_data:/bitnami/postgresql

  pgpool:
    image: pgpool/pgpool:latest
    depends_on:
      - postgres-primary
      - postgres-replica
    environment:
      - PGPOOL_PARAMS_BACKEND_HOSTNAME0=postgres-primary
      - PGPOOL_PARAMS_BACKEND_PORT0=5432
      - PGPOOL_PARAMS_BACKEND_WEIGHT0=1
      - PGPOOL_PARAMS_BACKEND_FLAG0=ALLOW_TO_FAILOVER
      - PGPOOL_PARAMS_BACKEND_HOSTNAME1=postgres-replica
      - PGPOOL_PARAMS_BACKEND_PORT1=5432
      - PGPOOL_PARAMS_BACKEND_WEIGHT1=1
      - PGPOOL_PARAMS_BACKEND_FLAG1=ALLOW_TO_FAILOVER
      - PGPOOL_PARAMS_LISTEN_ADDRESSES=*
      - PGPOOL_PARAMS_PORT=5432
      - PGPOOL_AUTH_USER=${POSTGRES_USER}
      - PGPOOL_AUTH_PASSWORD=${POSTGRES_PASSWORD}
      - PGPOOL_PARAMS_HEALTH_CHECK_PERIOD=0
      - PGPOOL_PARAMS_SR_CHECK_PERIOD=0
    ports:
      - "5432:5432"

  mongo:
    image: mongo:6-jammy
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672" # RabbitMQ Management Dashboard

volumes:
  postgres_primary_data:
  postgres_replica_data:
